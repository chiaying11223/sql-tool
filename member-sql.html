<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>SQL 片段庫</title>
<style>
  :root {
    --bg: #0a0e1a;
    --surface: #111827;
    --surface-2: #1a2234;
    --surface-3: #243048;
    --border: #1f2a3d;
    --border-strong: #334155;
    --text: #f1f5f9;
    --text-muted: #94a3b8;
    --text-subtle: #64748b;
    --accent: #60a5fa;
    --accent-hover: #3b82f6;
    --accent-soft: rgba(96, 165, 250, 0.12);
    --success: #34d399;
    --success-soft: rgba(52, 211, 153, 0.12);
    --warning: #fbbf24;
    --warning-soft: rgba(251, 191, 36, 0.12);
    --danger: #f87171;
    --danger-soft: rgba(248, 113, 113, 0.12);
    --radius: 8px;
    --radius-lg: 12px;
    --shadow-md: 0 4px 16px rgba(0, 0, 0, 0.4);
    --shadow-lg: 0 20px 50px rgba(0, 0, 0, 0.5);
    --font: -apple-system, BlinkMacSystemFont, "Segoe UI Variable", "Segoe UI", "PingFang TC", "Microsoft JhengHei", "Helvetica Neue", sans-serif;
    --font-mono: "JetBrains Mono", "SF Mono", Consolas, "Courier New", monospace;
  }

  * { box-sizing: border-box; }
  html { scroll-behavior: smooth; }
  body {
    margin: 0;
    font-family: var(--font);
    background: var(--bg);
    color: var(--text);
    font-size: 14px;
    line-height: 1.55;
    min-height: 100vh;
    -webkit-font-smoothing: antialiased;
  }
  ::selection { background: var(--accent); color: #0a0e1a; }
  code { font-family: var(--font-mono); font-size: 0.9em; padding: 1px 5px; background: var(--surface-2); border-radius: 3px; }

  /* ===== Header ===== */
  .app-header {
    max-width: 1100px;
    margin: 0 auto;
    padding: 22px 28px 14px;
    display: flex;
    align-items: center;
    justify-content: space-between;
    gap: 14px;
  }
  .app-title {
    display: flex;
    align-items: center;
    gap: 12px;
  }
  .app-title .logo {
    width: 36px; height: 36px;
    border-radius: 10px;
    background: linear-gradient(135deg, var(--accent) 0%, #a78bfa 100%);
    display: flex; align-items: center; justify-content: center;
    font-size: 18px; font-weight: 700; color: #0a0e1a;
  }
  .app-title h1 { margin: 0; font-size: 18px; font-weight: 650; letter-spacing: -0.01em; }
  .app-title .subtitle { margin: 2px 0 0; font-size: 12px; color: var(--text-muted); }

  /* ===== Mode Badge ===== */
  .mode-badge {
    padding: 6px 12px;
    border-radius: 100px;
    font-size: 12px;
    font-weight: 500;
    border: 1px solid var(--border);
    display: inline-flex; align-items: center; gap: 6px;
    background: var(--surface);
    color: var(--text-muted);
    cursor: pointer;
    transition: all 0.15s;
  }
  .mode-badge:hover { border-color: var(--accent); color: var(--text); }
  .mode-badge.sheet { color: var(--accent); background: var(--accent-soft); border-color: rgba(96, 165, 250, 0.35); }
  .mode-badge.warning { color: var(--warning); background: var(--warning-soft); border-color: rgba(251, 191, 36, 0.35); }
  .mode-badge .count { opacity: 0.7; font-family: var(--font-mono); font-size: 11px; }

  /* ===== Main ===== */
  main {
    max-width: 1100px;
    margin: 0 auto;
    padding: 0 28px 60px;
  }
  .toolbar {
    display: flex;
    gap: 10px;
    margin-bottom: 18px;
    align-items: center;
  }
  .toolbar .search {
    flex: 1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 10px 14px;
    color: var(--text);
    font-size: 14px;
    font-family: inherit;
  }
  .toolbar .search:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }

  /* ===== Buttons ===== */
  button {
    background: var(--accent);
    color: #0a0e1a;
    border: none;
    border-radius: var(--radius);
    padding: 9px 14px;
    font-weight: 600;
    cursor: pointer;
    font-size: 13px;
    font-family: inherit;
    transition: all 0.1s;
    display: inline-flex; align-items: center; gap: 6px;
  }
  button:hover { background: var(--accent-hover); transform: translateY(-1px); }
  button:active { transform: translateY(0); }
  button.secondary {
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border-strong);
  }
  button.secondary:hover { background: var(--surface-3); border-color: var(--accent); color: var(--accent); }
  button.ghost {
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
  }
  button.ghost:hover { background: var(--surface-2); color: var(--text); }
  button.danger {
    background: transparent;
    color: var(--danger);
    border: 1px solid var(--border);
  }
  button.danger:hover { background: var(--danger-soft); border-color: var(--danger); }
  button.icon-btn {
    padding: 7px;
    background: transparent;
    color: var(--text-muted);
    border: 1px solid var(--border);
    width: 32px; height: 32px;
    justify-content: center;
  }
  button.icon-btn:hover { background: var(--surface-2); color: var(--text); border-color: var(--border-strong); }
  button:disabled { opacity: 0.4; cursor: not-allowed; transform: none !important; }

  /* ===== Cards Grid ===== */
  .grid {
    display: grid;
    grid-template-columns: repeat(auto-fill, minmax(320px, 1fr));
    gap: 12px;
  }
  .q-card {
    padding: 14px 16px;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    transition: border-color 0.15s, transform 0.1s;
    display: flex;
    flex-direction: column;
    gap: 8px;
  }
  .q-card:hover { border-color: var(--border-strong); }
  .q-card .name {
    font-weight: 600;
    font-size: 14.5px;
    line-height: 1.3;
  }
  .q-card .desc {
    font-size: 12px;
    color: var(--text-muted);
    line-height: 1.5;
    flex: 1;
  }
  .q-card .actions {
    display: flex;
    gap: 6px;
    margin-top: 4px;
    flex-wrap: wrap;
  }
  .q-card .actions button { padding: 6px 12px; font-size: 12px; }
  .q-card .preview {
    margin-top: 4px;
    padding: 8px 10px;
    background: var(--surface-2);
    border-radius: 6px;
    font-family: var(--font-mono);
    font-size: 11px;
    color: var(--text-subtle);
    max-height: 60px;
    overflow: hidden;
    line-height: 1.5;
    position: relative;
  }
  .q-card .preview::after {
    content: '';
    position: absolute;
    bottom: 0; left: 0; right: 0; height: 18px;
    background: linear-gradient(transparent, var(--surface-2));
  }

  /* ===== Empty state ===== */
  .empty-state {
    text-align: center;
    padding: 60px 20px;
    color: var(--text-subtle);
    border: 1.5px dashed var(--border);
    border-radius: var(--radius-lg);
    cursor: pointer;
    transition: border-color 0.15s, color 0.15s;
  }
  .empty-state:hover {
    border-color: var(--accent);
    color: var(--accent);
  }
  .empty-state .icon { font-size: 36px; margin-bottom: 8px; opacity: 0.6; }
  .empty-state .label { font-size: 16px; font-weight: 600; margin-bottom: 4px; }
  .empty-state .hint { font-size: 12px; color: var(--text-subtle); }

  /* ===== Modal ===== */
  .modal {
    position: fixed;
    inset: 0;
    z-index: 100;
    display: flex;
    align-items: center;
    justify-content: center;
    animation: fadeIn 0.15s ease;
  }
  .modal[hidden] { display: none; }
  .modal-backdrop {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.55);
    backdrop-filter: blur(2px);
  }
  .modal-panel {
    position: relative;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: var(--radius-lg);
    width: min(640px, 92vw);
    max-height: 90vh;
    overflow: hidden;
    box-shadow: var(--shadow-lg);
    display: flex;
    flex-direction: column;
  }
  .modal-panel.large { width: min(900px, 95vw); }
  .modal-header {
    padding: 14px 20px;
    display: flex;
    align-items: center;
    gap: 12px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .modal-header h2 { margin: 0; font-size: 15px; font-weight: 600; flex: 1; }
  .modal-body {
    padding: 18px 20px;
    overflow-y: auto;
    flex: 1;
  }
  .modal-footer {
    padding: 12px 20px;
    border-top: 1px solid var(--border);
    display: flex;
    justify-content: space-between;
    gap: 8px;
    flex-shrink: 0;
    flex-wrap: wrap;
  }
  .modal-footer .right { display: flex; gap: 8px; }
  @keyframes fadeIn { from { opacity: 0; } to { opacity: 1; } }

  /* ===== Form ===== */
  .form-row { margin-bottom: 12px; }
  .form-row label { display: block; font-size: 12px; color: var(--text-muted); margin-bottom: 4px; font-weight: 500; }
  .form-row input[type=text],
  .form-row textarea {
    width: 100%;
    background: var(--surface-2);
    color: var(--text);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    padding: 9px 12px;
    font-family: var(--font-mono);
    font-size: 13px;
    line-height: 1.6;
    transition: border-color 0.15s;
  }
  .form-row textarea {
    min-height: 320px;
    resize: vertical;
    line-height: 1.65;
  }
  .form-row input[type=text]:focus,
  .form-row textarea:focus {
    outline: none;
    border-color: var(--accent);
    box-shadow: 0 0 0 3px var(--accent-soft);
  }
  .form-row .help { font-size: 11.5px; color: var(--text-subtle); margin-top: 4px; }

  /* ===== Toasts ===== */
  .toasts {
    position: fixed;
    top: 20px; right: 20px;
    z-index: 200;
    display: flex; flex-direction: column; gap: 8px;
    pointer-events: none;
  }
  .toast {
    padding: 10px 14px;
    background: var(--surface);
    border: 1px solid var(--border-strong);
    border-left: 3px solid var(--accent);
    border-radius: var(--radius);
    box-shadow: var(--shadow-md);
    font-size: 13px;
    color: var(--text);
    min-width: 220px; max-width: 360px;
    animation: toastIn 0.2s ease;
    pointer-events: auto;
  }
  .toast.success { border-left-color: var(--success); }
  .toast.warning { border-left-color: var(--warning); }
  .toast.error { border-left-color: var(--danger); }
  .toast.leaving { animation: toastOut 0.2s ease forwards; }
  @keyframes toastIn { from { opacity: 0; transform: translateX(12px); } to { opacity: 1; transform: translateX(0); } }
  @keyframes toastOut { to { opacity: 0; transform: translateX(12px); } }

  details summary { cursor: pointer; color: var(--text-muted); font-size: 12px; user-select: none; }
  details summary:hover { color: var(--text); }

  @media (max-width: 640px) {
    .app-header, main { padding-left: 16px; padding-right: 16px; }
  }
</style>
</head>
<body>

<header class="app-header">
  <div class="app-title">
    <div class="logo">📚</div>
    <div>
      <h1>SQL 片段庫</h1>
      <div class="subtitle">點查詢 → 改值 → 複製貼到 SSMS</div>
    </div>
  </div>
  <span id="modeBadge" class="mode-badge" onclick="openSyncModal()" title="點我設定儲存位置"></span>
</header>

<main>
  <div class="toolbar">
    <input class="search" id="searchBox" placeholder="🔍 搜尋查詢（名稱、簡述、SQL 內容）" oninput="renderGrid()">
    <button onclick="newQuery()">＋ 新增查詢</button>
  </div>
  <div id="queryGrid" class="grid"></div>
</main>

<!-- Edit Modal -->
<div class="modal" id="editModal" hidden>
  <div class="modal-backdrop" onclick="closeEdit()"></div>
  <div class="modal-panel large">
    <div class="modal-header">
      <h2 id="editTitle">編輯查詢</h2>
      <button class="icon-btn" onclick="closeEdit()">✕</button>
    </div>
    <div class="modal-body">
      <div class="form-row">
        <label>名稱</label>
        <input type="text" id="editName" placeholder="例如：對話紀錄">
      </div>
      <div class="form-row">
        <label>簡述（選填）</label>
        <input type="text" id="editDesc" placeholder="一句話介紹這個查詢做什麼">
      </div>
      <div class="form-row">
        <label>SQL <span style="color:var(--text-subtle); font-weight:400;">— 直接修改裡面的值（日期、ID、欄位都可以），按下方「複製」拿到剪貼簿</span></label>
        <textarea id="editSql" placeholder="貼整段 SQL，可以含硬寫的值..." spellcheck="false"></textarea>
      </div>
    </div>
    <div class="modal-footer">
      <button class="danger" id="editDelBtn" onclick="deleteFromEdit()">🗑 刪除</button>
      <div class="right">
        <button class="ghost" onclick="closeEdit()">取消</button>
        <button class="secondary" onclick="copyEditSql()">📋 複製目前 SQL</button>
        <button onclick="saveEdit()">💾 儲存到查詢庫</button>
      </div>
    </div>
  </div>
</div>

<!-- Sync Settings Modal -->
<div class="modal" id="syncModal" hidden>
  <div class="modal-backdrop" onclick="closeSyncModal()"></div>
  <div class="modal-panel">
    <div class="modal-header">
      <h2>🔗 儲存位置設定</h2>
      <button class="icon-btn" onclick="closeSyncModal()">✕</button>
    </div>
    <div class="modal-body" id="syncModalBody"></div>
  </div>
</div>

<!-- Toasts -->
<div class="toasts" id="toasts"></div>

<script>
/* ==================================================
 * State
 * ================================================== */
const STORE_KEY = 'member_sql_queries_v1';
const SOURCE_KEY = 'member_sql_source_v1';
const SHEET_URL_KEY = 'member_sql_sheet_url_v1';
const APPS_URL_KEY = 'member_sql_apps_url_v1';

let queries = [];
let editingId = null;
let syncSource = localStorage.getItem(SOURCE_KEY) || 'local';
let sheetUrl = localStorage.getItem(SHEET_URL_KEY) || '';
let appsUrl = localStorage.getItem(APPS_URL_KEY) || '';
let lastSyncStatus = null;

const $ = id => document.getElementById(id);
const esc = s => String(s ?? '').replace(/[&<>"']/g, c => ({ '&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;' }[c]));

function isSheetMode() { return syncSource === 'sheet' && !!sheetUrl; }

function loadQueries() {
  try { const raw = localStorage.getItem(STORE_KEY); if (raw) return JSON.parse(raw); } catch {}
  return [];
}
function saveQueries() { localStorage.setItem(STORE_KEY, JSON.stringify(queries)); }

/* ==================================================
 * Toast
 * ================================================== */
function toast(msg, type = 'info', duration = 2800) {
  const el = document.createElement('div');
  el.className = 'toast ' + (type === 'info' ? '' : type);
  el.textContent = msg;
  $('toasts').appendChild(el);
  setTimeout(() => { el.classList.add('leaving'); setTimeout(() => el.remove(), 200); }, duration);
}

/* ==================================================
 * CSV (for Google Sheet sync)
 * ================================================== */
function parseCSV(text) {
  const rows = []; let row = []; let field = ''; let inQ = false;
  const n = text.length; let i = 0;
  while (i < n) {
    const c = text[i];
    if (inQ) {
      if (c === '"') { if (text[i + 1] === '"') { field += '"'; i += 2; continue; } inQ = false; i++; continue; }
      field += c; i++; continue;
    }
    if (c === '"') { inQ = true; i++; continue; }
    if (c === ',') { row.push(field); field = ''; i++; continue; }
    if (c === '\r' || c === '\n') {
      if (c === '\r' && text[i + 1] === '\n') i++;
      row.push(field); field = '';
      if (row.length > 1 || (row[0] && row[0].length)) rows.push(row);
      row = []; i++; continue;
    }
    field += c; i++;
  }
  if (field.length || row.length) { row.push(field); rows.push(row); }
  return rows;
}

function queriesToCSV(arr) {
  const escCell = s => {
    s = String(s ?? '');
    return /[",\n\r]/.test(s) ? '"' + s.replace(/"/g, '""') + '"' : s;
  };
  const header = ['name', 'description', 'sql'];
  const lines = [header.join(',')];
  for (const q of arr) lines.push([q.name, q.description || '', q.sql].map(escCell).join(','));
  return lines.join('\n');
}

function csvToQueries(rows) {
  if (!rows.length) return [];
  const headers = rows[0].map(h => (h || '').trim().toLowerCase());
  const find = (...names) => {
    for (const n of names) { const i = headers.indexOf(n.toLowerCase()); if (i >= 0) return i; }
    return -1;
  };
  const nameIdx = find('name', '名稱');
  const sqlIdx = find('sql', '語法');
  const descIdx = find('description', 'desc', '簡述', '說明');
  if (nameIdx < 0) throw new Error('缺少 name 欄');
  if (sqlIdx < 0) throw new Error('缺少 sql 欄');

  const out = [];
  for (let r = 1; r < rows.length; r++) {
    const row = rows[r];
    const name = (row[nameIdx] || '').trim();
    const sql = (row[sqlIdx] || '').trim();
    if (!name && !sql) continue;
    out.push({
      id: 'sheet_' + r,
      name,
      description: descIdx >= 0 ? (row[descIdx] || '').trim() : '',
      sql
    });
  }
  return out;
}

async function fetchFromSheet(url) {
  const tryOne = async (u) => {
    const resp = await fetch(u, { cache: 'no-store' });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    if (text.trim().startsWith('<')) throw new Error('回傳是 HTML 不是 CSV');
    return text;
  };
  let text;
  try { text = await tryOne(url); }
  catch (err) {
    try { text = await tryOne('https://corsproxy.io/?url=' + encodeURIComponent(url)); }
    catch (err2) { throw new Error(`${err.message}（代理也失敗：${err2.message}）`); }
  }
  return csvToQueries(parseCSV(text));
}

const APPS_SCRIPT_CODE = `function doPost(e) {
  try {
    const p = JSON.parse(e.postData.contents);
    const sheet = SpreadsheetApp.getActiveSpreadsheet().getSheets()[0];
    const headers = ['name','description','sql'];
    sheet.getRange(1,1,1,headers.length).setValues([headers]);
    const last = sheet.getLastRow();
    if (last > 1) sheet.getRange(2,1,last-1,headers.length).clearContent();
    const rows = (p.queries||[]).map(q => headers.map(h => q[h] || ''));
    if (rows.length) sheet.getRange(2,1,rows.length,headers.length).setValues(rows);
    return ContentService.createTextOutput(JSON.stringify({ok:true,count:rows.length}))
      .setMimeType(ContentService.MimeType.JSON);
  } catch (err) {
    return ContentService.createTextOutput(JSON.stringify({ok:false,error:String(err)}))
      .setMimeType(ContentService.MimeType.JSON);
  }
}`;

async function writeToSheet(arr) {
  if (!appsUrl) return { ok: false, reason: 'no_url' };
  try {
    const resp = await fetch(appsUrl, {
      method: 'POST',
      headers: { 'Content-Type': 'text/plain;charset=utf-8' },
      body: JSON.stringify({ queries: arr })
    });
    if (!resp.ok) throw new Error(`HTTP ${resp.status}`);
    const text = await resp.text();
    let r;
    try { r = JSON.parse(text); } catch { throw new Error('回應非 JSON'); }
    if (!r.ok) throw new Error(r.error || '未知錯誤');
    return { ok: true, count: r.count };
  } catch (err) { return { ok: false, reason: err.message }; }
}

async function copyAppsScriptCode() {
  try {
    await navigator.clipboard.writeText(APPS_SCRIPT_CODE);
    toast('✓ Apps Script 程式碼已複製', 'success');
  } catch { toast('複製失敗', 'error'); }
}

/* ==================================================
 * Mode Badge
 * ================================================== */
function updateModeBadge() {
  const badge = $('modeBadge'); if (!badge) return;
  const n = queries.length;
  if (isSheetMode()) {
    badge.className = 'mode-badge sheet';
    badge.innerHTML = `🔗 Google Sheet 同步中 <span class="count">${n} 筆</span>`;
  } else if (syncSource === 'sheet') {
    badge.className = 'mode-badge warning';
    badge.innerHTML = `⚠ 尚未設定 Sheet URL`;
  } else {
    badge.className = 'mode-badge';
    badge.innerHTML = `💾 本機儲存 <span class="count">${n} 筆</span>`;
  }
}

/* ==================================================
 * Grid
 * ================================================== */
function getFiltered() {
  const q = ($('searchBox').value || '').trim().toLowerCase();
  if (!q) return queries;
  return queries.filter(item =>
    (item.name || '').toLowerCase().includes(q) ||
    (item.description || '').toLowerCase().includes(q) ||
    (item.sql || '').toLowerCase().includes(q)
  );
}

function renderGrid() {
  const grid = $('queryGrid');
  if (!queries.length) {
    grid.innerHTML = `
      <div class="empty-state" onclick="newQuery()" style="grid-column:1/-1;">
        <div class="icon">📝</div>
        <div class="label">還沒有查詢</div>
        <div class="hint">點這裡或上方「＋ 新增查詢」開始建立</div>
      </div>`;
    updateModeBadge();
    return;
  }

  const list = getFiltered();
  if (!list.length) {
    grid.innerHTML = `
      <div class="empty-state" style="grid-column:1/-1;cursor:default;">
        <div class="icon">🔍</div>
        <div class="label">沒有符合的查詢</div>
        <div class="hint">換個關鍵字試試</div>
      </div>`;
    updateModeBadge();
    return;
  }

  grid.innerHTML = list.map(q => {
    const preview = (q.sql || '').replace(/\s+/g, ' ').slice(0, 200);
    return `
      <div class="q-card">
        <div class="name">${esc(q.name)}</div>
        ${q.description ? `<div class="desc">${esc(q.description)}</div>` : ''}
        ${preview ? `<div class="preview">${esc(preview)}</div>` : ''}
        <div class="actions">
          <button class="secondary" data-act="open" data-id="${esc(q.id)}">📋 開啟並複製</button>
          <button class="ghost" data-act="quick-copy" data-id="${esc(q.id)}" title="不開啟編輯框，直接複製原始 SQL">⚡ 快速複製</button>
        </div>
      </div>
    `;
  }).join('');

  grid.querySelectorAll('button[data-act]').forEach(btn => {
    btn.addEventListener('click', () => {
      const id = btn.dataset.id;
      const act = btn.dataset.act;
      if (act === 'open') openEdit(id);
      else if (act === 'quick-copy') quickCopy(id);
    });
  });

  updateModeBadge();
}

async function quickCopy(id) {
  const q = queries.find(x => x.id === id);
  if (!q) return;
  try {
    await navigator.clipboard.writeText(q.sql);
    toast(`✓ 已複製「${q.name}」原始 SQL`, 'success');
  } catch { toast('複製失敗', 'error'); }
}

/* ==================================================
 * Edit Modal
 * ================================================== */
function newQuery() {
  editingId = null;
  $('editTitle').textContent = '新增查詢';
  $('editName').value = '';
  $('editDesc').value = '';
  $('editSql').value = '';
  $('editDelBtn').style.display = 'none';
  $('editModal').hidden = false;
  setTimeout(() => $('editName').focus(), 50);
}

function openEdit(id) {
  const q = queries.find(x => x.id === id);
  if (!q) return;
  editingId = id;
  $('editTitle').textContent = '編輯查詢';
  $('editName').value = q.name || '';
  $('editDesc').value = q.description || '';
  $('editSql').value = q.sql || '';
  $('editDelBtn').style.display = '';
  $('editModal').hidden = false;
  setTimeout(() => $('editSql').focus(), 50);
}

function closeEdit() {
  $('editModal').hidden = true;
  editingId = null;
}

async function copyEditSql() {
  const sql = $('editSql').value;
  if (!sql.trim()) { toast('SQL 是空的', 'warning'); return; }
  try {
    await navigator.clipboard.writeText(sql);
    toast('✓ 目前 SQL 已複製到剪貼簿', 'success');
  } catch { toast('複製失敗', 'error'); }
}

async function saveEdit() {
  const name = $('editName').value.trim();
  const desc = $('editDesc').value.trim();
  const sql = $('editSql').value.trim();
  if (!name) { toast('請輸入名稱', 'warning'); $('editName').focus(); return; }
  if (!sql) { toast('請輸入 SQL', 'warning'); $('editSql').focus(); return; }

  const data = {
    id: editingId || ('q_' + Date.now() + '_' + Math.random().toString(36).slice(2, 6)),
    name, description: desc, sql
  };
  if (editingId) {
    const i = queries.findIndex(q => q.id === editingId);
    if (i >= 0) queries[i] = data;
  } else {
    queries.push(data);
  }
  saveQueries();
  closeEdit();
  renderGrid();

  if (isSheetMode() && appsUrl) {
    toast('同步到 Sheet 中...', 'info', 1500);
    const r = await writeToSheet(queries);
    if (r.ok) toast(`✅ 已儲存並同步到 Sheet：${name}`, 'success');
    else toast(`⚠ 本機已存，但 Sheet 寫入失敗：${r.reason}`, 'error', 5500);
  } else {
    toast(`💾 已儲存：${name}`, 'success');
  }
}

async function deleteFromEdit() {
  if (!editingId) return;
  const q = queries.find(x => x.id === editingId);
  if (!q) return;
  if (!confirm(`確定要刪除「${q.name}」？`)) return;
  queries = queries.filter(x => x.id !== editingId);
  saveQueries();
  closeEdit();
  renderGrid();

  if (isSheetMode() && appsUrl) {
    const r = await writeToSheet(queries);
    if (r.ok) toast(`✓ 已刪除並同步：${q.name}`, 'success');
    else toast(`⚠ 本機已刪，但 Sheet 寫入失敗：${r.reason}`, 'error', 5000);
  } else {
    toast(`🗑 已刪除：${q.name}`, 'success');
  }
}

/* ==================================================
 * Sync Modal
 * ================================================== */
function openSyncModal() {
  $('syncModalBody').innerHTML = renderSyncPanel();
  $('syncModal').hidden = false;
}
function closeSyncModal() { $('syncModal').hidden = true; }

function renderSyncPanel() {
  const sheet = isSheetMode();
  const status = lastSyncStatus
    ? (lastSyncStatus.ok
        ? `<span style="color:var(--success)">✓ ${esc(lastSyncStatus.message)}</span>`
        : `<span style="color:var(--danger)">⚠ ${esc(lastSyncStatus.message)}</span>`)
    : '';
  return `
    <div style="font-size:13px; font-weight:600; margin-bottom:10px;">📂 查詢儲存位置</div>
    <div style="display:flex; gap:14px; margin-bottom:14px;">
      <label style="display:flex; align-items:center; gap:6px; cursor:pointer;">
        <input type="radio" name="src" ${syncSource === 'local' ? 'checked' : ''} onchange="switchSource('local')">
        <span>💾 本機（瀏覽器內）</span>
      </label>
      <label style="display:flex; align-items:center; gap:6px; cursor:pointer;">
        <input type="radio" name="src" ${syncSource === 'sheet' ? 'checked' : ''} onchange="switchSource('sheet')">
        <span>🔗 Google Sheet</span>
      </label>
    </div>
    ${syncSource === 'sheet' ? `
      <div class="form-row">
        <label>📥 讀取 URL（CSV 發布網址）</label>
        <input type="text" id="sheetUrlInput" placeholder="https://docs.google.com/.../pub?output=csv" value="${esc(sheetUrl)}">
        <div style="display:flex; gap:8px; margin-top:8px;">
          <button onclick="applySheetUrl()">套用</button>
          ${sheet ? '<button class="secondary" onclick="syncNow()">🔄 重抓</button>' : ''}
          <div style="flex:1; text-align:right; font-size:12px; align-self:center;">${status}</div>
        </div>
      </div>
      <div class="form-row" style="border-top:1px dashed var(--border); padding-top:14px;">
        <label>✨ 自動寫入 URL（Apps Script）<span style="color:var(--text-subtle); font-weight:400;">— 選填</span></label>
        <input type="text" id="appsUrlInput" placeholder="https://script.google.com/macros/s/.../exec" value="${esc(appsUrl)}">
        <div style="display:flex; gap:8px; margin-top:8px;">
          <button onclick="applyAppsUrl()">套用</button>
          <button class="secondary" onclick="copyAppsScriptCode()">📋 複製 Apps Script 程式碼</button>
        </div>
        <details style="margin-top:8px;">
          <summary>📖 Apps Script 設定步驟</summary>
          <ol style="font-size:12px; color:var(--text-muted); padding-left:20px; margin:6px 0 0; line-height:1.7;">
            <li>到你的 Sheet → 擴充功能 → Apps Script</li>
            <li>刪掉預設 code，貼上「📋 複製 Apps Script 程式碼」按鈕的內容</li>
            <li>Ctrl+S 存檔（命名隨意）</li>
            <li>右上「部署 → 新增部署作業」</li>
            <li>齒輪 → 網路應用程式　執行身分：我　存取權：任何人</li>
            <li>部署 → 授權（進階 → 前往未驗證應用程式 → 允許）</li>
            <li>複製「網路應用程式 URL」貼到上方，按套用</li>
          </ol>
        </details>
        ${sheet && appsUrl ? '<div style="color:var(--success); font-size:12px; margin-top:8px;">✅ 雙向同步啟用中：新增/編輯/刪除自動寫入 Sheet</div>' : ''}
        ${sheet && !appsUrl ? '<div style="color:var(--warning); font-size:12px; margin-top:8px;">💡 目前只讀不寫：新增/編輯只存本機，要手動同步到 Sheet</div>' : ''}
      </div>
    ` : ''}
  `;
}

function switchSource(s) {
  syncSource = s;
  localStorage.setItem(SOURCE_KEY, s);
  if (s === 'local') {
    queries = loadQueries();
    lastSyncStatus = null;
    toast('已切換至本機儲存', 'success');
    renderGrid();
  }
  openSyncModal(); // re-render
}

async function applySheetUrl() {
  const url = ($('sheetUrlInput').value || '').trim();
  if (!url) { toast('請先貼 URL', 'warning'); return; }
  if (!url.includes('output=csv')) {
    if (!confirm('此 URL 不像 CSV 發布網址（缺 output=csv）。仍要套用嗎？')) return;
  }
  try {
    const fromSheet = await fetchFromSheet(url);
    sheetUrl = url;
    localStorage.setItem(SHEET_URL_KEY, url);
    queries = fromSheet;
    lastSyncStatus = { ok: true, message: `同步 ${queries.length} 筆` };
    toast(`✓ 載入 ${queries.length} 筆`, 'success');
    renderGrid();
    openSyncModal();
  } catch (err) {
    lastSyncStatus = { ok: false, message: err.message };
    toast('載入失敗：' + err.message, 'error', 5000);
    openSyncModal();
  }
}

async function syncNow() {
  if (!isSheetMode()) return;
  try {
    queries = await fetchFromSheet(sheetUrl);
    lastSyncStatus = { ok: true, message: `同步 ${queries.length} 筆` };
    toast(`✓ 已同步 ${queries.length} 筆`, 'success');
    renderGrid();
    openSyncModal();
  } catch (err) {
    lastSyncStatus = { ok: false, message: err.message };
    toast('同步失敗：' + err.message, 'error', 5000);
    openSyncModal();
  }
}

async function applyAppsUrl() {
  const url = ($('appsUrlInput').value || '').trim();
  if (!url) {
    appsUrl = ''; localStorage.removeItem(APPS_URL_KEY);
    toast('已清除 Apps Script URL', 'success');
    openSyncModal(); return;
  }
  if (!url.includes('script.google.com')) {
    if (!confirm('URL 看起來不像 Apps Script。仍要套用？')) return;
  }
  appsUrl = url;
  localStorage.setItem(APPS_URL_KEY, url);
  toast('測試連線中...', 'info', 1500);
  const r = await writeToSheet(queries);
  if (r.ok) toast(`✅ 連線成功！已寫入 ${r.count} 筆`, 'success', 4000);
  else toast(`⚠ 連線失敗：${r.reason}`, 'error', 5000);
  openSyncModal();
}

/* ==================================================
 * Keyboard
 * ================================================== */
document.addEventListener('keydown', e => {
  if (e.key === 'Escape') {
    if (!$('editModal').hidden) closeEdit();
    else if (!$('syncModal').hidden) closeSyncModal();
  }
  // Ctrl+Enter in edit modal → save
  if ((e.ctrlKey || e.metaKey) && e.key === 'Enter' && !$('editModal').hidden) {
    e.preventDefault();
    saveEdit();
  }
});

/* ==================================================
 * Init
 * ================================================== */
async function initApp() {
  if (isSheetMode()) {
    try {
      queries = await fetchFromSheet(sheetUrl);
      lastSyncStatus = { ok: true, message: `同步 ${queries.length} 筆` };
      toast(`✓ 從 Google Sheet 同步 ${queries.length} 筆`, 'success');
    } catch (err) {
      queries = loadQueries();
      lastSyncStatus = { ok: false, message: err.message };
      toast(`⚠ Sheet 同步失敗：${err.message}。暫用本機。`, 'error', 5500);
    }
  } else {
    queries = loadQueries();
  }
  renderGrid();
}

initApp();
</script>
</body>
</html>
